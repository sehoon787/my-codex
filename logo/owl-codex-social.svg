<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>The Maestro Owl — my-codex (social preview)</title>

  <defs>
    <filter id="glow-social-cx" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark navy -->
  <rect width="1280" height="640" fill="#0f172a"/>

  <!-- Decorative purple orbital elements scattered in background -->
  <g id="bg-orbitals" opacity="0.35">
    <path d="M 60,80 Q 30,200 80,340" stroke="#7c3aed" stroke-width="1" fill="none"/>
    <path d="M 1220,80 Q 1250,200 1200,340" stroke="#7c3aed" stroke-width="1" fill="none"/>
    <path d="M 100,560 Q 300,610 500,580" stroke="#a78bfa" stroke-width="0.8" fill="none"/>
    <path d="M 780,560 Q 980,610 1180,580" stroke="#a78bfa" stroke-width="0.8" fill="none"/>
    <path d="M 200,30 Q 400,10 600,25" stroke="#6d28d9" stroke-width="0.7" fill="none"/>
    <path d="M 680,25 Q 880,10 1080,30" stroke="#6d28d9" stroke-width="0.7" fill="none"/>
    <line x1="60" y1="100" x2="30" y2="160" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="30" y1="160" x2="55" y2="230" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="55" y1="230" x2="25" y2="300" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="1220" y1="100" x2="1250" y2="160" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="1250" y1="160" x2="1225" y2="230" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="1225" y1="230" x2="1255" y2="300" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="130" y1="560" x2="80" y2="510" stroke="#a78bfa" stroke-width="0.6"/>
    <line x1="350" y1="580" x2="310" y2="520" stroke="#a78bfa" stroke-width="0.6"/>
    <line x1="930" y1="580" x2="970" y2="520" stroke="#a78bfa" stroke-width="0.6"/>
    <line x1="1150" y1="560" x2="1200" y2="510" stroke="#a78bfa" stroke-width="0.6"/>
  </g>
  <g id="bg-nodes" filter="url(#glow-social-cx)">
    <circle cx="60" cy="100" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="30" cy="160" r="2.5" fill="#a78bfa" opacity="0.45"/>
    <circle cx="55" cy="230" r="3.5" fill="#7c3aed" opacity="0.5"/>
    <circle cx="25" cy="300" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="1220" cy="100" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="1250" cy="160" r="2.5" fill="#a78bfa" opacity="0.45"/>
    <circle cx="1225" cy="230" r="3.5" fill="#7c3aed" opacity="0.5"/>
    <circle cx="1255" cy="300" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="130" cy="560" r="3" fill="#a78bfa" opacity="0.4"/>
    <circle cx="80" cy="510" r="2" fill="#6d28d9" opacity="0.4"/>
    <circle cx="350" cy="580" r="3.5" fill="#7c3aed" opacity="0.45"/>
    <circle cx="310" cy="520" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="930" cy="580" r="3.5" fill="#7c3aed" opacity="0.45"/>
    <circle cx="970" cy="520" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="1150" cy="560" r="3" fill="#a78bfa" opacity="0.4"/>
    <circle cx="1200" cy="510" r="2" fill="#6d28d9" opacity="0.4"/>
    <circle cx="220" cy="28" r="2.5" fill="#6d28d9" opacity="0.4"/>
    <circle cx="420" cy="18" r="2" fill="#a78bfa" opacity="0.35"/>
    <circle cx="580" cy="30" r="3" fill="#7c3aed" opacity="0.4"/>
    <circle cx="700" cy="18" r="2" fill="#a78bfa" opacity="0.35"/>
    <circle cx="860" cy="28" r="2.5" fill="#6d28d9" opacity="0.4"/>
    <circle cx="1060" cy="22" r="2" fill="#a78bfa" opacity="0.35"/>
  </g>

  <!-- === OWL CHARACTER centered, scaled ~280px tall === -->
  <g id="owl" transform="translate(500, 80) scale(1.4)">

    <!-- Orbital graph -->
    <g id="orbitals" opacity="0.6">
      <path d="M 38,40 Q 18,78 34,118" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.55"/>
      <path d="M 162,40 Q 182,78 166,118" stroke="#7c3aed" stroke-width="1" fill="none" opacity="0.55"/>
      <path d="M 55,20 Q 100,8 145,20" stroke="#a78bfa" stroke-width="0.9" fill="none" opacity="0.5"/>
      <line x1="28" y1="55" x2="18" y2="80" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
      <line x1="18" y1="80" x2="30" y2="105" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
      <line x1="172" y1="55" x2="182" y2="80" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
      <line x1="182" y1="80" x2="170" y2="105" stroke="#7c3aed" stroke-width="0.7" opacity="0.5"/>
      <line x1="62" y1="16" x2="28" y2="55" stroke="#a78bfa" stroke-width="0.6" opacity="0.45"/>
      <line x1="138" y1="16" x2="172" y2="55" stroke="#a78bfa" stroke-width="0.6" opacity="0.45"/>
      <line x1="100" y1="10" x2="62" y2="16" stroke="#a78bfa" stroke-width="0.6" opacity="0.45"/>
      <line x1="100" y1="10" x2="138" y2="16" stroke="#a78bfa" stroke-width="0.6" opacity="0.45"/>
    </g>
    <g id="orbital-nodes">
      <circle cx="28" cy="55" r="3" fill="#a78bfa" opacity="0.8"/>
      <circle cx="18" cy="80" r="2" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="30" cy="105" r="2.5" fill="#a78bfa" opacity="0.75"/>
      <circle cx="172" cy="55" r="3" fill="#a78bfa" opacity="0.8"/>
      <circle cx="182" cy="80" r="2" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="170" cy="105" r="2.5" fill="#a78bfa" opacity="0.75"/>
      <circle cx="100" cy="10" r="2.5" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="62" cy="16" r="1.8" fill="#7c3aed" opacity="0.65"/>
      <circle cx="138" cy="16" r="1.8" fill="#7c3aed" opacity="0.65"/>
    </g>

    <!-- Body: teal -->
    <path d="M72 132 Q62 150 66 174 Q100 184 134 174 Q138 150 128 132 Z" fill="#10b981"/>

    <!-- Wings -->
    <path d="M72 132 L60 128 L42 148 L48 158 L66 150 L72 138 Z" fill="#0d9668"/>
    <path d="M128 132 L140 126 L158 136 L156 148 L138 146 L128 138 Z" fill="#0d9668"/>

    <!-- Baton -->
    <line x1="155" y1="132" x2="178" y2="110" stroke="#0d9668" stroke-width="3" stroke-linecap="round"/>
    <circle cx="178" cy="110" r="4.5" fill="#0d9668"/>
    <circle cx="178" cy="110" r="2.5" fill="#6ee7b7"/>

    <!-- Feet -->
    <rect x="82" y="176" width="14" height="7" rx="3.5" fill="#0d9668"/>
    <rect x="104" y="176" width="14" height="7" rx="3.5" fill="#0d9668"/>

    <!-- Head: ellipse -->
    <ellipse cx="100" cy="78" rx="56" ry="52" fill="#10b981"/>

    <!-- Facial disc -->
    <ellipse cx="100" cy="82" rx="44" ry="38" fill="#059669" opacity="0.35"/>

    <!-- Brow tufts -->
    <polygon points="76,32 66,12 80,20 84,30" fill="#0d9668"/>
    <polygon points="124,32 134,12 120,20 116,30" fill="#0d9668"/>

    <!-- Eyes -->
    <circle cx="80" cy="82" r="24" fill="#f4faf7"/>
    <circle cx="80" cy="82" r="16" fill="#6ee7b7"/>
    <circle cx="80" cy="82" r="12" fill="#10b981" opacity="0.4"/>
    <circle cx="80" cy="82" r="8" fill="#064e3b"/>
    <circle cx="85" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
    <circle cx="77" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>

    <circle cx="120" cy="82" r="24" fill="#f4faf7"/>
    <circle cx="120" cy="82" r="16" fill="#6ee7b7"/>
    <circle cx="120" cy="82" r="12" fill="#10b981" opacity="0.4"/>
    <circle cx="120" cy="82" r="8" fill="#064e3b"/>
    <circle cx="125" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
    <circle cx="117" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>

    <!-- Beak -->
    <polygon points="100,100 94,109 106,109" fill="#0d9668"/>

    <!-- Chest chevrons -->
    <g fill="none" stroke="#6ee7b7" stroke-linecap="square" stroke-linejoin="miter">
      <polyline points="90,143 100,135 110,143" stroke-width="3"/>
      <polyline points="86,152 100,142 114,152" stroke-width="2.5"/>
      <polyline points="82,161 100,149 118,161" stroke-width="2"/>
      <polyline points="78,170 100,156 122,170" stroke-width="1.6"/>
    </g>

  </g>

  <!-- Brand name -->
  <text
    x="640"
    y="510"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="72"
    font-weight="600"
    letter-spacing="-2"
    fill="#f4faf7"
    text-anchor="middle"
  ><tspan opacity="0.4">my-</tspan><tspan fill="#10b981">codex</tspan></text>

  <!-- Subtitle -->
  <text
    x="640"
    y="562"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="18"
    font-weight="400"
    letter-spacing="3"
    fill="#a78bfa"
    opacity="0.7"
    text-anchor="middle"
  >THE MAESTRO OWL</text>

  <!-- Purple accent line -->
  <line x1="540" y1="584" x2="740" y2="584" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

</svg>
