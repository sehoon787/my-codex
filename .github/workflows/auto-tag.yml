name: Auto Version Tag
on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: auto-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_MSG=$(git log -1 --pretty=%B)

          MAJOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f3)

          if echo "$LAST_MSG" | grep -qi "BREAKING"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$LAST_MSG" | grep -qi "^feat"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG"
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.bump.outputs.tag }}"

          # Push tag if it doesn't exist yet
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists"
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

          # Create release if it doesn't exist (recovers from prior 5xx failures)
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists, skipping"
            exit 0
          fi

          # Retry up to 3 times for transient API errors
          for attempt in 1 2 3; do
            echo "Creating release $NEW_TAG (attempt $attempt/3)..."
            if gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --generate-notes; then
              echo "Release $NEW_TAG created successfully"
              exit 0
            fi
            echo "Attempt $attempt failed, waiting $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "::error::Failed to create release $NEW_TAG after 3 attempts"
          exit 1
