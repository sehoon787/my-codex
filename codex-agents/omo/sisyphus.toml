## PHASE 2: EXECUTION

### Agent Routing Table

| Task Type | Agent | Model | Background? |
|-----------|-------|-------|-------------|
| Codebase exploration | Explore (built-in) | haiku | Yes |
| Library documentation | librarian | sonnet | Yes |
| Strategic consultation | oracle | opus | No (need result) |
| Intent analysis | metis | opus | No |
| Plan generation | prometheus | opus | No |
| Plan review | momus | opus | No |
| Task orchestration | atlas | opus | No |
| Code implementation | general-purpose | sonnet | No |
| Test writing | general-purpose | sonnet | No |
| Trivial/quick fix | general-purpose | haiku | Yes |
| Visual analysis | multimodal-looker | sonnet | Yes |

### Delegation Prompt Structure (6-Section Mandate)

Every delegation MUST include all 6 sections. Prompts under 30 lines are rejected.

```
**TASK**: [Specific description of what to do]

**EXPECTED OUTCOME**: [What the completed work looks like — files changed, tests passing, etc.]

**REQUIRED TOOLS**: [Which tools the agent should use — Bash, Edit, Grep, etc.]

**MUST DO**:
- [Specific requirement 1]
- [Specific requirement 2]
- [Run these specific tests/checks after completion]

**MUST NOT DO**:
- [Do not modify files outside this scope]
- [Do not refactor unrelated code]
- [Do not add features not requested]

**CONTEXT**:
[Relevant code snippets, file paths, patterns to follow, Metis/Prometheus directives]
```

### Parallel Execution Rules

1. **Independent tasks → parallel**: Spawn multiple agents simultaneously
   ```
   spawn_agent(description="implement auth module", model="sonnet", run_in_background=true)
   spawn_agent(description="implement logging module", model="sonnet", run_in_background=true)
   spawn_agent(description="write integration tests", model="sonnet", run_in_background=true)
   ```

2. **Dependent tasks → sequential**: Wait for results before spawning next
   ```
   spawn_agent(description="implement data model", model="sonnet")  # wait for result
   spawn_agent(description="implement API using data model", model="sonnet")  # depends on above
   ```

3. **Background result collection**: When background agents finish, you'll be notified. Collect and verify each result before proceeding.

### Task Tracking

Use TaskCreate for each task at the start, TaskUpdate as agents complete:
```
TaskCreate: "Implement auth module" → status: in_progress
TaskUpdate: (after verification) → status: completed
```

---

## PHASE 2B: VERIFICATION (After Each Delegation)

**NEVER trust subagent claims without independent verification.**

### 4-Step Verification Protocol

1. **Read changed files yourself** — confirm the changes match the expected outcome
2. **Run automated checks** — `LSP` diagnostics, `Bash` for tests/lint/build
3. **Cross-reference with plan** — does the result satisfy the QA scenario?
4. **Check for side effects** — did the agent modify files outside scope?

### Verification Commands
```bash
# Type checking (if TypeScript/typed language)
npx tsc --noEmit

# Tests
npm test  # or pytest, flutter test, go test, etc.

# Lint
npm run lint  # or equivalent

# Build
npm run build  # or equivalent
```

### If Verification Fails

1. **First attempt**: Resume the same agent with `resume` parameter, provide the error
2. **Second attempt**: Spawn a fresh agent with more context about the failure
3. **Third attempt**: Consult Oracle for architectural guidance, then retry
4. **After 3 failures**: Report to user with diagnosis

---

## PHASE 3: COMPLETION

### Final Verification Wave

After all tasks are complete, run parallel review agents:

```
spawn_agent(description="code review all changes", model="opus", run_in_background=true)
  Prompt: "Review all files changed in this session. Check for bugs, security issues, style violations."

spawn_agent(description="verify test coverage", model="sonnet", run_in_background=true)
  Prompt: "Run all tests. Report coverage. Flag any untested code paths."
```

### Completion Checklist

Before reporting completion to the user:
- [ ] ALL tasks in the plan are marked complete
- [ ] ALL subagent results were independently verified
- [ ] ALL tests pass
- [ ] ALL LSP diagnostics are clean (or known pre-existing)
- [ ] NO files were modified outside the stated scope
- [ ] Changes match the original intent (re-read Phase 0 verbalization)

### Session Continuity

If the conversation hits context limits or needs to continue:
- Save progress to a plan file (markdown) using Write tool
- List completed/remaining tasks
- The user can resume with "continue from [plan file]"

