<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>The Maestro Owl — my-codex (social preview)</title>

  <defs>
    <!-- Background gradient: sage top-left to white bottom-right -->
    <linearGradient id="bg-gradient-codex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4ede0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient-codex)"/>

  <!-- Scattered constellation dots -->
  <g id="bg-constellation" fill="#10a37f" opacity="0.18">
    <circle cx="80" cy="60" r="4"/>
    <circle cx="160" cy="110" r="2.5"/>
    <circle cx="240" cy="45" r="3.5"/>
    <circle cx="340" cy="90" r="2"/>
    <circle cx="60" cy="200" r="3"/>
    <circle cx="190" cy="260" r="2.5"/>
    <circle cx="110" cy="320" r="4"/>
    <circle cx="280" cy="380" r="2"/>
    <circle cx="50" cy="440" r="3"/>
    <circle cx="180" cy="500" r="2.5"/>
    <circle cx="130" cy="580" r="3.5"/>
    <circle cx="300" cy="550" r="2"/>

    <circle cx="1000" cy="70" r="3.5"/>
    <circle cx="1100" cy="40" r="2.5"/>
    <circle cx="1180" cy="100" r="4"/>
    <circle cx="1220" cy="180" r="2"/>
    <circle cx="1050" cy="240" r="3"/>
    <circle cx="1150" cy="310" r="2.5"/>
    <circle cx="1200" cy="400" r="3.5"/>
    <circle cx="1080" cy="470" r="2"/>
    <circle cx="1160" cy="530" r="3"/>
    <circle cx="1020" cy="590" r="2.5"/>
    <circle cx="1240" cy="590" r="4"/>
    <circle cx="950" cy="480" r="2"/>

    <circle cx="450" cy="30" r="2.5"/>
    <circle cx="600" cy="580" r="3"/>
    <circle cx="700" cy="50" r="2"/>
    <circle cx="820" cy="600" r="3.5"/>
    <circle cx="920" cy="30" r="2"/>
  </g>
  <g stroke="#10a37f" stroke-width="0.8" opacity="0.1" fill="none">
    <line x1="80" y1="60" x2="160" y2="110"/>
    <line x1="160" y1="110" x2="240" y2="45"/>
    <line x1="60" y1="200" x2="110" y2="320"/>
    <line x1="1000" y1="70" x2="1100" y2="40"/>
    <line x1="1100" y1="40" x2="1180" y2="100"/>
    <line x1="1150" y1="310" x2="1200" y2="400"/>
    <line x1="1200" y1="400" x2="1160" y2="530"/>
  </g>

  <!-- === OWL CHARACTER centered === -->
  <g id="owl" transform="translate(540, 148) scale(1.7)">

    <!-- Body -->
    <path d="M72 132 Q62 150 66 174 Q100 184 134 174 Q138 150 128 132 Z" fill="#10a37f"/>

    <!-- Wings -->
    <path d="M72 132 L60 128 L42 148 L48 158 L66 150 L72 138 Z" fill="#0b7a5e"/>
    <path d="M128 132 L140 126 L158 136 L156 148 L138 146 L128 138 Z" fill="#0b7a5e"/>

    <!-- Baton -->
    <line x1="155" y1="132" x2="178" y2="110" stroke="#0b7a5e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="178" cy="110" r="4.5" fill="#0b7a5e"/>
    <circle cx="178" cy="110" r="2.5" fill="#6ec6a7"/>

    <!-- Feet -->
    <rect x="82" y="176" width="14" height="7" rx="3.5" fill="#0b7a5e"/>
    <rect x="104" y="176" width="14" height="7" rx="3.5" fill="#0b7a5e"/>

    <!-- Head -->
    <rect x="46" y="28" width="108" height="108" rx="34" ry="34" fill="#10a37f"/>

    <!-- Facial disc -->
    <ellipse cx="100" cy="82" rx="44" ry="38" fill="#0b7a5e" opacity="0.3"/>

    <!-- Brow tufts -->
    <polygon points="74,30 66,10 78,18 82,28" fill="#0b7a5e"/>
    <polygon points="126,30 134,10 122,18 118,28" fill="#0b7a5e"/>

    <!-- Eyes -->
    <circle cx="80" cy="82" r="24" fill="#f4faf7"/>
    <circle cx="80" cy="82" r="16" fill="#6ec6a7"/>
    <circle cx="80" cy="82" r="12" fill="#10a37f" opacity="0.4"/>
    <circle cx="80" cy="82" r="8" fill="#0d2118"/>
    <circle cx="85" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
    <circle cx="77" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>

    <circle cx="120" cy="82" r="24" fill="#f4faf7"/>
    <circle cx="120" cy="82" r="16" fill="#6ec6a7"/>
    <circle cx="120" cy="82" r="12" fill="#10a37f" opacity="0.4"/>
    <circle cx="120" cy="82" r="8" fill="#0d2118"/>
    <circle cx="125" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
    <circle cx="117" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>

    <!-- Beak -->
    <polygon points="100,100 94,109 106,109" fill="#0b7a5e"/>

    <!-- Chest chevrons -->
    <g fill="none" stroke="#6ec6a7" stroke-linecap="square" stroke-linejoin="miter">
      <polyline points="90,143 100,135 110,143" stroke-width="3"/>
      <polyline points="86,152 100,142 114,152" stroke-width="2.5"/>
      <polyline points="82,161 100,149 118,161" stroke-width="2"/>
      <polyline points="78,170 100,156 122,170" stroke-width="1.6"/>
    </g>

  </g>

  <!-- Wordmark -->
  <text
    x="640"
    y="494"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="72"
    font-weight="600"
    letter-spacing="-2"
    fill="#0d2118"
    text-anchor="middle"
  ><tspan opacity="0.4">my-</tspan><tspan>codex</tspan></text>

  <!-- Tagline -->
  <text
    x="640"
    y="548"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-size="20"
    font-weight="400"
    letter-spacing="0.5"
    fill="#0d2118"
    opacity="0.4"
    text-anchor="middle"
  >All-in-one agent harness for OpenAI Codex CLI</text>

  <!-- Subtle bottom accent line -->
  <line x1="510" y1="572" x2="770" y2="572" stroke="#10a37f" stroke-width="1" opacity="0.3"/>

</svg>
