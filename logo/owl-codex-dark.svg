<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <title>The Maestro Owl — my-codex (dark)</title>

  <!-- Background: transparent — designed for dark backgrounds -->

  <g id="owl-codex-dark">

    <!-- === OWL CHARACTER === -->
    <g id="owl">

      <!-- Constellation dots -->
      <g id="constellation" fill="#6ec6a7" opacity="0.45">
        <circle cx="22" cy="52" r="3"/>
        <circle cx="14" cy="76" r="1.8"/>
        <circle cx="32" cy="90" r="2.4"/>
        <circle cx="178" cy="50" r="3"/>
        <circle cx="186" cy="74" r="1.8"/>
        <circle cx="168" cy="88" r="2.4"/>
        <circle cx="100" cy="10" r="2"/>
        <circle cx="42" cy="30" r="1.4"/>
        <circle cx="158" cy="28" r="1.4"/>
      </g>
      <g stroke="#6ec6a7" stroke-width="0.7" opacity="0.2" fill="none">
        <line x1="22" y1="52" x2="14" y2="76"/>
        <line x1="14" y1="76" x2="32" y2="90"/>
        <line x1="178" y1="50" x2="186" y2="74"/>
        <line x1="186" y1="74" x2="168" y2="88"/>
        <line x1="100" y1="10" x2="42" y2="30"/>
        <line x1="100" y1="10" x2="158" y2="28"/>
      </g>

      <!-- Body: mint on dark -->
      <path id="body" d="M72 132 Q62 150 66 174 Q100 184 134 174 Q138 150 128 132 Z" fill="#6ec6a7"/>

      <!-- Wings: teal -->
      <path id="wing-left" d="M72 132 L60 128 L42 148 L48 158 L66 150 L72 138 Z" fill="#10a37f"/>
      <path id="wing-right" d="M128 132 L140 126 L158 136 L156 148 L138 146 L128 138 Z" fill="#10a37f"/>

      <!-- Baton -->
      <g id="baton">
        <line x1="155" y1="132" x2="178" y2="110" stroke="#10a37f" stroke-width="3" stroke-linecap="round"/>
        <circle cx="178" cy="110" r="4.5" fill="#10a37f"/>
        <circle cx="178" cy="110" r="2.5" fill="#d4ede0"/>
      </g>

      <!-- Feet -->
      <g id="feet" fill="#10a37f">
        <rect x="82" y="176" width="14" height="7" rx="3.5"/>
        <rect x="104" y="176" width="14" height="7" rx="3.5"/>
      </g>

      <!-- Head: mint -->
      <rect id="head" x="46" y="28" width="108" height="108" rx="34" ry="34" fill="#6ec6a7"/>

      <!-- Facial disc -->
      <ellipse id="facial-disc" cx="100" cy="82" rx="44" ry="38" fill="#10a37f" opacity="0.3"/>

      <!-- Brow tufts -->
      <g id="brow-tufts" fill="#10a37f">
        <polygon points="74,30 66,10 78,18 82,28"/>
        <polygon points="126,30 134,10 122,18 118,28"/>
      </g>

      <!-- Eyes -->
      <g id="eyes">
        <circle cx="80" cy="82" r="24" fill="#f4faf7"/>
        <circle cx="80" cy="82" r="16" fill="#6ec6a7"/>
        <circle cx="80" cy="82" r="12" fill="#10a37f" opacity="0.4"/>
        <circle cx="80" cy="82" r="8" fill="#0d2118"/>
        <circle cx="85" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
        <circle cx="77" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>

        <circle cx="120" cy="82" r="24" fill="#f4faf7"/>
        <circle cx="120" cy="82" r="16" fill="#6ec6a7"/>
        <circle cx="120" cy="82" r="12" fill="#10a37f" opacity="0.4"/>
        <circle cx="120" cy="82" r="8" fill="#0d2118"/>
        <circle cx="125" cy="77" r="3.5" fill="#f4faf7" opacity="0.85"/>
        <circle cx="117" cy="87" r="1.5" fill="#f4faf7" opacity="0.4"/>
      </g>

      <!-- Beak -->
      <polygon id="beak" points="100,100 94,109 106,109" fill="#10a37f"/>

      <!-- Chest chevrons -->
      <g id="chest-chevrons" fill="none" stroke="#d4ede0" stroke-linecap="square" stroke-linejoin="miter">
        <polyline points="90,143 100,135 110,143" stroke-width="3"/>
        <polyline points="86,152 100,142 114,152" stroke-width="2.5"/>
        <polyline points="82,161 100,149 118,161" stroke-width="2"/>
        <polyline points="78,170 100,156 122,170" stroke-width="1.6"/>
      </g>

    </g>

    <!-- === WORDMARK === -->
    <g id="wordmark" transform="translate(212, 0)">

      <!-- Separator line -->
      <line x1="0" y1="62" x2="0" y2="138" stroke="#6ec6a7" stroke-width="1.5" opacity="0.4"/>

      <!-- "my-codex" text: white -->
      <text
        x="22"
        y="112"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="44"
        font-weight="600"
        letter-spacing="-1.5"
        fill="#ffffff"
      ><tspan opacity="0.5">my-</tspan><tspan>codex</tspan></text>

      <!-- Subtitle in brand color -->
      <text
        x="23"
        y="134"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="10.5"
        font-weight="400"
        letter-spacing="2.5"
        fill="#6ec6a7"
        opacity="0.8"
      >THE MAESTRO OWL</text>

      <!-- Agent baseline dots -->
      <g id="baseline-dots" fill="#6ec6a7" opacity="0.45">
        <circle cx="23" cy="148" r="2"/>
        <circle cx="31" cy="148" r="2"/>
        <circle cx="39" cy="148" r="2"/>
        <circle cx="47" cy="148" r="1.4"/>
        <circle cx="54" cy="148" r="1.4"/>
        <circle cx="60" cy="148" r="1"/>
      </g>

    </g>

  </g>
</svg>
