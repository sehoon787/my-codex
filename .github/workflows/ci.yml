name: CI
on:
  push:
    branches: [main, 'auto/**']
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate TOML agents
        run: |
          python3 -c "
          import tomllib, os, sys
          errors = []
          for root, dirs, files in os.walk('codex-agents'):
              for f in files:
                  if not f.endswith('.toml'): continue
                  path = os.path.join(root, f)
                  try:
                      with open(path, 'rb') as fh: tomllib.load(fh)
                  except Exception as e:
                      errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All {len([f for r,d,fs in os.walk(\"codex-agents\") for f in fs if f.endswith(\".toml\")])} TOML files valid')
          "
      - name: Validate MCP config
        run: |
          python3 -c "import json; json.load(open('.mcp.json'))"
      - name: Check core agents exist
        run: |
          # Agents are split by source: core/, omo/, omc/, awesome-core/
          check_agent() {
            local name=$1 dir=$2
            test -f "codex-agents/${dir}/${name}.toml" || (echo "Missing agent: ${name} in ${dir}/" && exit 1)
          }
          check_agent boss core
          for agent in sisyphus atlas hephaestus prometheus oracle momus metis librarian multimodal-looker; do
            check_agent "$agent" omo
          done
          for agent in executor planner debugger code-reviewer architect analyst \
                     code-simplifier critic document-specialist explore git-master \
                     qa-tester scientist security-reviewer test-engineer tracer \
                     verifier writer; do
            check_agent "$agent" omc
          done
          for agent in agent-installer agent-organizer code-mapper context-manager \
                     error-coordinator knowledge-synthesizer multi-agent-coordinator \
                     task-distributor workflow-orchestrator; do
            check_agent "$agent" awesome-core
          done
      - name: Validate agent required fields
        run: |
          python3 -c "
          import tomllib, os, sys
          errors = []
          for root, dirs, files in os.walk('codex-agents'):
              for f in files:
                  if not f.endswith('.toml'): continue
                  path = os.path.join(root, f)
                  with open(path, 'rb') as fh:
                      data = tomllib.load(fh)
                  for field in ['name', 'description', 'developer_instructions']:
                      if field not in data:
                          errors.append(f'{path}: missing {field}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print('All agents have required fields')
          "
      - name: Validate skills
        run: |
          count=0
          for f in $(find skills/ecc -name 'SKILL.md' 2>/dev/null); do
            head -1 "$f" | grep -q '^---' || (echo "Missing frontmatter: $f" && exit 1)
            count=$((count + 1))
          done
          echo "All $count skills have valid frontmatter"
      - name: Installer smoke test
        run: bash scripts/test-install.sh
      - name: Check install docs consistency
        run: |
          if rg -n 'Spawn 578 agents|578 agents|319 agents|282 agent-packs|282개 에이전트팩|282개 도메인 에이전트|95 skills|95개 스킬|95 スキル|95 个技能|Skills \| 95|스킬 \| 95|技能 \| 95|Awesome agents \(136\)|어썸 에이전트\(136개\)|素晴らしいエージェント \(136\)|Awesome 智能体（136 个）|Awesome-Agenten \(136\)|136개 프로덕션급|136 個のプロダクション|136 个生产级|136 produktionsreife' README.md AI-INSTALL.md SETUP.md docs/index.html docs/i18n; then
            echo "Found stale install counts in first-party docs"
            exit 1
          fi
