name: CI
on:
  push:
    branches: [main, 'auto/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Init submodules (shallow)
        run: git submodule update --init --depth 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate self-owned TOML agents
        run: |
          python3 -c "
          import tomllib, os, sys
          errors = []
          for d in ['codex-agents/core', 'codex-agents/omo']:
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if not f.endswith('.toml'): continue
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'rb') as fh: tomllib.load(fh)
                      except Exception as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          count = sum(1 for d in ['codex-agents/core', 'codex-agents/omo']
                      for r,_,fs in os.walk(d) for f in fs if f.endswith('.toml'))
          print(f'All {count} self-owned TOML files valid')
          "
      - name: Validate MCP config
        run: |
          python3 -c "import json; json.load(open('.mcp.json'))"
      - name: Check core agents exist
        run: |
          check_agent() {
            local name=$1 dir=$2
            test -f "codex-agents/${dir}/${name}.toml" || (echo "Missing agent: ${name} in ${dir}/" && exit 1)
          }
          check_agent boss core
          for agent in sisyphus atlas hephaestus prometheus oracle momus metis librarian multimodal-looker; do
            check_agent "$agent" omo
          done
      - name: Validate agent required fields
        run: |
          python3 -c "
          import tomllib, os, sys
          errors = []
          for d in ['codex-agents/core', 'codex-agents/omo']:
              for root, dirs, files in os.walk(d):
                  for f in files:
                      if not f.endswith('.toml'): continue
                      path = os.path.join(root, f)
                      with open(path, 'rb') as fh:
                          data = tomllib.load(fh)
                      for field in ['name', 'description', 'developer_instructions']:
                          if field not in data:
                              errors.append(f'{path}: missing {field}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print('All self-owned agents have required fields')
          "
      - name: Validate upstream submodules exist
        run: |
          for sub in agency-agents ecc awesome omx gstack superpowers; do
            test -d "upstream/$sub" || (echo "Missing submodule: upstream/$sub" && exit 1)
          done
          echo "All 6 upstream submodules present"

          # Verify upstream repos have expected content
          test -d upstream/agency-agents/engineering || echo "WARN: agency-agents/engineering not found"
          test -d upstream/ecc/skills || echo "WARN: ecc/skills not found"
          test -d upstream/awesome/categories || echo "WARN: awesome/categories not found"
          test -d upstream/gstack || echo "WARN: gstack root not found"
          test -d upstream/superpowers/skills || echo "WARN: superpowers/skills not found"

          AWESOME_COUNT=$(find upstream/awesome/categories -name '*.toml' 2>/dev/null | wc -l)
          echo "Awesome upstream agents: $AWESOME_COUNT"
          ECC_SKILLS=$(find upstream/ecc/skills -name 'SKILL.md' 2>/dev/null | wc -l)
          echo "ECC upstream skills: $ECC_SKILLS"
      - name: Validate self-owned skills
        run: |
          count=0
          for f in $(find skills/core -name 'SKILL.md' 2>/dev/null); do
            head -1 "$f" | grep -q '^---' || (echo "Missing frontmatter: $f" && exit 1)
            count=$((count + 1))
          done
          echo "All $count self-owned skills have valid frontmatter"
      - name: Installer smoke test
        run: |
          bash scripts/test-install.sh
          bash scripts/test-codex-attribution.sh
          bash scripts/test-skills-only-install.sh
          bash scripts/test-agent-pack-activation.sh
