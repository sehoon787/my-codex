name: Sync Upstream Dependencies
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Agency Agents (MD format → staging)
      - name: Sync agency-agents
        run: |
          git clone --depth 1 https://github.com/msitarzewski/agency-agents.git /tmp/agency
          AGENCY_SHA=$(cd /tmp/agency && git rev-parse HEAD)
          echo "AGENCY_SHA=$AGENCY_SHA" >> $GITHUB_ENV

          mkdir -p staging/agency
          for cat in engineering design testing product game-development marketing \
                     sales academic project-management specialized spatial-computing \
                     support strategy; do
            if [ -d "/tmp/agency/$cat" ]; then
              mkdir -p "staging/agency/$cat"
              cp /tmp/agency/$cat/*.md "staging/agency/$cat/" 2>/dev/null || true
            fi
          done
          # Add model field to agents missing it
          find staging/agency -name '*.md' | while read f; do
            if ! grep -q '^model:' "$f"; then
              sed -i '/^description:/a model: gpt-5.4' "$f"
            fi
          done
          AGENCY_COUNT=$(find staging/agency -name '*.md' | wc -l)
          echo "AGENCY_COUNT=$AGENCY_COUNT" >> $GITHUB_ENV

      # 2. ECC Skills + Rules
      - name: Sync everything-claude-code
        run: |
          git clone --depth 1 https://github.com/affaan-m/everything-claude-code.git /tmp/ecc
          ECC_SHA=$(cd /tmp/ecc && git rev-parse HEAD)
          echo "ECC_SHA=$ECC_SHA" >> $GITHUB_ENV

          if [ -d /tmp/ecc/skills ]; then
            rm -rf skills/ecc && mkdir -p skills/ecc
            cp -r /tmp/ecc/skills/* skills/ecc/
            # Auto-add frontmatter to skills missing it (upstream doesn't always include it)
            find skills/ecc -name 'SKILL.md' | while read f; do
              if ! head -1 "$f" | grep -q '^---'; then
                SKILL_NAME=$(basename "$(dirname "$f")")
                HEADING=$(head -1 "$f" | sed 's/^# //')
                { echo '---'; echo "name: $SKILL_NAME"; echo "description: $HEADING"; echo '---'; echo ''; cat "$f"; } > "$f.tmp"
                mv "$f.tmp" "$f"
              fi
            done
          fi
          if [ -d /tmp/ecc/rules ]; then
            rm -rf rules && mkdir -p rules
            cp -r /tmp/ecc/rules/* rules/
          fi
          ECC_SKILLS=$(find skills/ecc -name 'SKILL.md' | wc -l)
          ECC_RULES=$(find rules -name '*.md' | wc -l)
          CORE_SKILLS=$(find skills/core -name 'SKILL.md' 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_SKILLS=$((ECC_SKILLS + CORE_SKILLS))
          echo "ECC_SKILLS=$ECC_SKILLS" >> $GITHUB_ENV
          echo "ECC_RULES=$ECC_RULES" >> $GITHUB_ENV
          echo "CORE_SKILLS=$CORE_SKILLS" >> $GITHUB_ENV
          echo "TOTAL_SKILLS=$TOTAL_SKILLS" >> $GITHUB_ENV

      # 3. oh-my-codex
      # OMX has no agents/ directory — tracked for future skill sync
      - name: Sync oh-my-codex
        run: |
          git clone --depth 1 https://github.com/Yeachan-Heo/oh-my-codex.git /tmp/omx || { echo "OMX_SHA=n/a" >> $GITHUB_ENV; echo "OMX_AGENTS=0" >> $GITHUB_ENV; echo "OMX_CDX_SKILLS=0" >> $GITHUB_ENV; exit 0; }
          OMX_SHA=$(cd /tmp/omx && git rev-parse HEAD)
          echo "OMX_SHA=$OMX_SHA" >> $GITHUB_ENV

          # OMX is a CLI runtime (36 skills, hooks, HUD) — it has no agents/ directory.
          # Agent count is explicitly 0; tracked here for future skill sync if needed.
          OMX_AGENTS=0
          echo "OMX_AGENTS=$OMX_AGENTS" >> $GITHUB_ENV
          echo "OMX_CDX_SKILLS=0" >> $GITHUB_ENV

      # 4. Awesome Codex Subagents
      - name: Sync awesome-codex-subagents
        run: |
          git clone --depth 1 https://github.com/VoltAgent/awesome-codex-subagents.git /tmp/awesome
          AWESOME_SHA=$(cd /tmp/awesome && git rev-parse HEAD)
          echo "AWESOME_SHA=$AWESOME_SHA" >> $GITHUB_ENV

          rm -rf codex-agents/awesome && mkdir -p codex-agents/awesome
          if [ -d /tmp/awesome/categories ]; then
            cp -r /tmp/awesome/categories/* codex-agents/awesome/
          fi
          AWESOME_COUNT=$(find codex-agents/awesome -name '*.toml' 2>/dev/null | wc -l)
          echo "AWESOME_COUNT=$AWESOME_COUNT" >> $GITHUB_ENV

      # 5. Convert MD agents → TOML
      - name: Convert agents to TOML
        run: |
          # omo/, omc/, awesome-core/ agents are maintained directly as .toml in this repo.
          # They are not re-converted from staging; they persist across sync runs.

          # Run conversion: staging/ → codex-agents/
          bash scripts/md-to-toml.sh staging codex-agents

          CORE_COUNT=$(find codex-agents/core -name '*.toml' 2>/dev/null | wc -l)
          OMO_COUNT=$(find codex-agents/omo -name '*.toml' 2>/dev/null | wc -l)
          OMC_COUNT=$(find codex-agents/omc -name '*.toml' 2>/dev/null | wc -l)
          AWESOME_CORE_COUNT=$(find codex-agents/awesome-core -name '*.toml' 2>/dev/null | wc -l)
          PACK_COUNT=$(find codex-agents/agent-packs -name '*.toml' 2>/dev/null | wc -l)
          AGENCY_TOML_COUNT=$(find codex-agents/agency -name '*.toml' 2>/dev/null | wc -l)
          eval "$(bash scripts/compute-install-counts.sh)"
          eval "$(bash scripts/compute-skills-only-count.sh)"
          echo "CORE_COUNT=$CORE_COUNT" >> $GITHUB_ENV
          echo "OMO_COUNT=$OMO_COUNT" >> $GITHUB_ENV
          echo "OMC_COUNT=$OMC_COUNT" >> $GITHUB_ENV
          echo "AWESOME_CORE_COUNT=$AWESOME_CORE_COUNT" >> $GITHUB_ENV
          echo "PACK_COUNT=$PACK_COUNT" >> $GITHUB_ENV
          echo "AGENCY_TOML_COUNT=$AGENCY_TOML_COUNT" >> $GITHUB_ENV
          echo "AUTO_LOADED_COUNT=$AUTO_LOADED_COUNT" >> $GITHUB_ENV
          echo "AGENT_PACK_COUNT=$AGENT_PACK_COUNT" >> $GITHUB_ENV
          echo "SKILL_COUNT=$SKILL_COUNT" >> $GITHUB_ENV
          echo "SKILLS_ONLY_COUNT=$SKILLS_ONLY_COUNT" >> $GITHUB_ENV
          echo "INSTALLED_AGENT_TOTAL=$INSTALLED_AGENT_TOTAL" >> $GITHUB_ENV
          echo "SOURCE_TOML_COUNT=$SOURCE_TOML_COUNT" >> $GITHUB_ENV

      # 6. Update SOURCES.json
      - name: Update SOURCES.json
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          node -e "
            const fs = require('fs');
            const sources = {
              'agency-agents': {
                repo: 'https://github.com/msitarzewski/agency-agents',
                syncedSha: '$AGENCY_SHA',
                syncedAt: '$NOW',
                files: { agents: parseInt('$AGENCY_COUNT') }
              },
              'everything-claude-code': {
                repo: 'https://github.com/affaan-m/everything-claude-code',
                syncedSha: '$ECC_SHA',
                syncedAt: '$NOW',
                files: { skills: parseInt('$ECC_SKILLS'), rules: parseInt('$ECC_RULES') }
              },
              'awesome-codex-subagents': {
                repo: 'https://github.com/VoltAgent/awesome-codex-subagents',
                syncedSha: '$AWESOME_SHA',
                syncedAt: '$NOW',
                files: { agents: parseInt('$AWESOME_COUNT') }
              },
              'oh-my-codex': {
                repo: 'https://github.com/Yeachan-Heo/oh-my-codex',
                syncedSha: '$OMX_SHA',
                syncedAt: '$NOW',
                files: { agents: parseInt('$OMX_AGENTS') }
              }
            };
            fs.mkdirSync('upstream', { recursive: true });
            fs.writeFileSync('upstream/SOURCES.json', JSON.stringify(sources, null, 2));
          "

      # 7. Update documentation counts
      - name: Update documentation counts
        run: |
          eval "$(bash scripts/compute-install-counts.sh)"
          for f in README.md docs/i18n/README.ko.md docs/i18n/README.ja.md docs/i18n/README.zh.md docs/i18n/README.de.md docs/i18n/README.fr.md; do
            [ -f "$f" ] || continue
            sed -i -E "s/skills-[0-9]+/skills-${SKILL_COUNT}/g" "$f"
            sed -i -E "s/agents-[0-9]+/agents-${INSTALLED_AGENT_TOTAL}/g" "$f"
            sed -i -E "s/\\*\\*[0-9]+ installed agent files\\*\\*/**${INSTALLED_AGENT_TOTAL} installed agent files**/g" "$f" || true
          done

          # README prose uses installed footprint, not raw upstream totals.
          if [ -f README.md ]; then
            sed -i -E "s/Awesome agents add additional coverage, but overlapping filenames collapse the final auto-loaded set to [0-9]+ installed files/Awesome agents add additional coverage, but overlapping filenames collapse the final auto-loaded set to ${AUTO_LOADED_COUNT} installed files/" README.md
            sed -i -E "s/[0-9]+ installed pack files across [0-9]+ categories/${AGENT_PACK_COUNT} installed pack files across 21 categories/" README.md
            sed -i -E "s/Installs [0-9]+ cross-tool skills to `~\\/\\.agents\\/skills\\/`/Installs ${SKILLS_ONLY_COUNT} cross-tool skills to `~\\/\\.agents\\/skills\\/`/" README.md
          fi
          if [ -f AI-INSTALL.md ]; then
            sed -i -E "s/To install only the [0-9]+ cross-tool skills exposed by `npx skills add`/To install only the ${SKILLS_ONLY_COUNT} cross-tool skills exposed by `npx skills add`/" AI-INSTALL.md
          fi
          if [ -f docs/i18n/README.ko.md ]; then
            # Hero line: **NNN개 설치 에이전트 파일** (NNN개 자동 로드 + NNN개 에이전트팩)과 **NNN개 스킬**
            sed -i -E "s/\*\*[0-9]+개 설치 에이전트 파일\*\* \([0-9]+개 자동 로드 \+ [0-9]+개 에이전트팩\)과 \*\*[0-9]+개 스킬\*\*/**${INSTALLED_AGENT_TOTAL}개 설치 에이전트 파일** (${AUTO_LOADED_COUNT}개 자동 로드 + ${AGENT_PACK_COUNT}개 에이전트팩)과 **${SKILL_COUNT}개 스킬**/" docs/i18n/README.ko.md
            # Zero-config principle: NNN개 에이전트
            sed -i -E "s/한 번 설치하면 [0-9]+개 에이전트/한 번 설치하면 ${INSTALLED_AGENT_TOTAL}개 에이전트/" docs/i18n/README.ko.md
            # All-in-one bundle: **NNN개 설치 에이전트 파일과 NNN개 스킬**
            sed -i -E "s/\*\*[0-9]+개 설치 에이전트 파일과 [0-9]+개 스킬\*\*/**${INSTALLED_AGENT_TOTAL}개 설치 에이전트 파일과 ${SKILL_COUNT}개 스킬**/" docs/i18n/README.ko.md
            # Core agents prose: auto-loaded count
            sed -i -E "s/자동 로드 에이전트 순 [0-9]+개/자동 로드 에이전트 순 ${AUTO_LOADED_COUNT}개/" docs/i18n/README.ko.md
            # Agent pack section: NNN개 설치 팩 파일이
            sed -i -E "s/[0-9]+개 설치 팩 파일이 \`~\\/\\.codex\\/agent-packs\\/\`에 기록되며/${AGENT_PACK_COUNT}개 설치 팩 파일이 \`~\/.codex\/agent-packs\/\`에 기록되며/" docs/i18n/README.ko.md
            # Table row: auto-loaded agents  "80 (37 코어 + 54 어썸 − 11 공유)"
            sed -i -E "s/[0-9]+ \(37 코어 \+ 54 어썸 − 11 공유\)/${AUTO_LOADED_COUNT} (37 코어 + 54 어썸 − 11 공유)/" docs/i18n/README.ko.md
            # Table row: pack files "364 설치 파일"
            sed -i -E "s/에이전트 팩 \| [0-9]+ 설치 파일/에이전트 팩 | ${AGENT_PACK_COUNT} 설치 파일/" docs/i18n/README.ko.md
            # Table row: skills count
            sed -i -E "s/\| 스킬 \| [0-9]+ \|/| 스킬 | ${SKILL_COUNT} |/" docs/i18n/README.ko.md
            # Architecture diagram: NNN개 고유 네이티브 TOML 에이전트
            sed -i -E "s/[0-9]+개 고유 네이티브 TOML 에이전트/${INSTALLED_AGENT_TOTAL}개 고유 네이티브 TOML 에이전트/" docs/i18n/README.ko.md
            # Architecture diagram: 자동 로드 (NNN)
            sed -i -E "s/자동 로드 \([0-9]+\)/자동 로드 (${AUTO_LOADED_COUNT})/" docs/i18n/README.ko.md
            # Architecture diagram: 에이전트 팩 (NNN)
            sed -i -E "s/에이전트 팩 \([0-9]+\)/에이전트 팩 (${AGENT_PACK_COUNT})/" docs/i18n/README.ko.md
            # Architecture diagram: ECC에서 NNN개
            sed -i -E "s/ECC에서 [0-9]+개/ECC에서 ${SKILL_COUNT}개/" docs/i18n/README.ko.md
          fi
          if [ -f docs/i18n/README.ja.md ]; then
            # Hero line: **NNN インストール済みエージェントファイル** (NNN 自動読み込み + NNN エージェントパック)
            sed -i -E "s/\*\*[0-9]+ インストール済みエージェントファイル\*\* \([0-9]+ 自動読み込み \+ [0-9]+ エージェントパック\)/**${INSTALLED_AGENT_TOTAL} インストール済みエージェントファイル** (${AUTO_LOADED_COUNT} 自動読み込み + ${AGENT_PACK_COUNT} エージェントパック)/" docs/i18n/README.ja.md
            # Hero: NNN スキル (appears as "125 スキル" after the parenthetical)
            sed -i -E "s/ \*\*[0-9]+ スキル\*\*/ **${SKILL_COUNT} スキル**/" docs/i18n/README.ja.md
            # Zero-config: NNN エージェントが手に入ります
            sed -i -E "s/[0-9]+ エージェントが手に入ります/${INSTALLED_AGENT_TOTAL} エージェントが手に入ります/" docs/i18n/README.ja.md
            # All-in-one bundle: **NNN インストール済みエージェントファイルと NNN スキル**
            sed -i -E "s/\*\*[0-9]+ インストール済みエージェントファイルと [0-9]+ スキル\*\*/**${INSTALLED_AGENT_TOTAL} インストール済みエージェントファイルと ${SKILL_COUNT} スキル**/" docs/i18n/README.ja.md
            # Agent pack section: NNN 個のインストール済みパックファイル
            sed -i -E "s/[0-9]+ 個のインストール済みパックファイル/${AGENT_PACK_COUNT} 個のインストール済みパックファイル/" docs/i18n/README.ja.md
            # Table row: auto-loaded "80 (37 コア + 54 素晴らしい − 11 共有)"
            sed -i -E "s/[0-9]+ \(37 コア \+ 54 素晴らしい − 11 共有\)/${AUTO_LOADED_COUNT} (37 コア + 54 素晴らしい − 11 共有)/" docs/i18n/README.ja.md
            # Table row: pack "364 インストール済みファイル"
            sed -i -E "s/エージェントパック \| [0-9]+ インストール済みファイル/エージェントパック | ${AGENT_PACK_COUNT} インストール済みファイル/" docs/i18n/README.ja.md
            # Table row: skills
            sed -i -E "s/\| スキル \| [0-9]+ \|/| スキル | ${SKILL_COUNT} |/" docs/i18n/README.ja.md
            # Architecture diagram (English text in code block)
            sed -i -E "s/Agent Layer \([0-9]+ unique agents/Agent Layer (${INSTALLED_AGENT_TOTAL} unique agents/" docs/i18n/README.ja.md
            sed -i -E "s/Auto-loaded \([0-9]+\)/Auto-loaded (${AUTO_LOADED_COUNT})/" docs/i18n/README.ja.md
            sed -i -E "s/Agent Packs \([0-9]+\)/Agent Packs (${AGENT_PACK_COUNT})/" docs/i18n/README.ja.md
            sed -i -E "s/Skills Layer \([0-9]+ from ECC\)/Skills Layer (${SKILL_COUNT} from ECC)/" docs/i18n/README.ja.md
          fi
          if [ -f docs/i18n/README.zh.md ]; then
            # Hero line: **NNN 个已安装智能体文件**（NNN 个自动加载 + NNN 个智能体包）和 **NNN 个技能**
            sed -i -E "s/\*\*[0-9]+ 个已安装智能体文件\*\*（[0-9]+ 个自动加载 \+ [0-9]+ 个智能体包）和 \*\*[0-9]+ 个技能\*\*/**${INSTALLED_AGENT_TOTAL} 个已安装智能体文件**（${AUTO_LOADED_COUNT} 个自动加载 + ${AGENT_PACK_COUNT} 个智能体包）和 **${SKILL_COUNT} 个技能**/" docs/i18n/README.zh.md
            # Zero-config: NNN 个智能体
            sed -i -E "s/一次安装，获得 [0-9]+ 个智能体/一次安装，获得 ${INSTALLED_AGENT_TOTAL} 个智能体/" docs/i18n/README.zh.md
            # All-in-one bundle: **NNN 个已安装智能体文件和 NNN 个技能**
            sed -i -E "s/\*\*[0-9]+ 个已安装智能体文件和 [0-9]+ 个技能\*\*/**${INSTALLED_AGENT_TOTAL} 个已安装智能体文件和 ${SKILL_COUNT} 个技能**/" docs/i18n/README.zh.md
            # Agent pack section: NNN 个已安装包文件
            sed -i -E "s/[0-9]+ 个已安装包文件跨 [0-9]+ 个类别/${AGENT_PACK_COUNT} 个已安装包文件跨 21 个类别/" docs/i18n/README.zh.md
            # Table row: auto-loaded "80（37 个核心 + 54 个 awesome − 11 个共享）"
            sed -i -E "s/[0-9]+（37 个核心 \+ 54 个 awesome − 11 个共享）/${AUTO_LOADED_COUNT}（37 个核心 + 54 个 awesome − 11 个共享）/" docs/i18n/README.zh.md
            # Table row: pack "364 个已安装文件"
            sed -i -E "s/智能体包 \| [0-9]+ 个已安装文件/智能体包 | ${AGENT_PACK_COUNT} 个已安装文件/" docs/i18n/README.zh.md
            # Table row: skills
            sed -i -E "s/\| 技能 \| [0-9]+ \|/| 技能 | ${SKILL_COUNT} |/" docs/i18n/README.zh.md
            # Architecture diagram (English in code block)
            sed -i -E "s/Agent Layer \([0-9]+ unique agents/Agent Layer (${INSTALLED_AGENT_TOTAL} unique agents/" docs/i18n/README.zh.md
            sed -i -E "s/Auto-loaded \([0-9]+\)/Auto-loaded (${AUTO_LOADED_COUNT})/" docs/i18n/README.zh.md
            sed -i -E "s/Agent Packs \([0-9]+\)/Agent Packs (${AGENT_PACK_COUNT})/" docs/i18n/README.zh.md
            sed -i -E "s/Skills Layer \([0-9]+ from ECC\)/Skills Layer (${SKILL_COUNT} from ECC)/" docs/i18n/README.zh.md
          fi
          if [ -f docs/i18n/README.de.md ]; then
            # Hero line: **NNN installierte Agent-Dateien** (NNN automatisch geladen + NNN Agent-Pakete) und **NNN Skills**
            sed -i -E "s/\*\*[0-9]+ installierte Agent-Dateien\*\* \([0-9]+ automatisch geladen \+ [0-9]+ Agent-Pakete\) und \*\*[0-9]+ Skills\*\*/**${INSTALLED_AGENT_TOTAL} installierte Agent-Dateien** (${AUTO_LOADED_COUNT} automatisch geladen + ${AGENT_PACK_COUNT} Agent-Pakete) und **${SKILL_COUNT} Skills**/" docs/i18n/README.de.md
            # Zero-config: NNN Agenten
            sed -i -E "s/Einmalige Installation, [0-9]+ Agenten/Einmalige Installation, ${INSTALLED_AGENT_TOTAL} Agenten/" docs/i18n/README.de.md
            # All-in-one bundle: **NNN installierte Agent-Dateien und NNN Skills**
            sed -i -E "s/\*\*[0-9]+ installierte Agent-Dateien und [0-9]+ Skills\*\*/**${INSTALLED_AGENT_TOTAL} installierte Agent-Dateien und ${SKILL_COUNT} Skills**/" docs/i18n/README.de.md
            # Core agents prose: 11 Dateinamenkollisionen → NNN eindeutige automatisch geladene Agenten
            sed -i -E "s/ergeben [0-9]+ eindeutige automatisch geladene Agenten/ergeben ${AUTO_LOADED_COUNT} eindeutige automatisch geladene Agenten/" docs/i18n/README.de.md
            # Agent pack section: NNN installierte Paketdateien über 21 Kategorien
            sed -i -E "s/[0-9]+ installierte Paketdateien über 21 Kategorien/${AGENT_PACK_COUNT} installierte Paketdateien über 21 Kategorien/" docs/i18n/README.de.md
            # Table row: auto-loaded "80 (37 Core + 54 Awesome − 11 gemeinsam)"
            sed -i -E "s/[0-9]+ \(37 Core \+ 54 Awesome − 11 gemeinsam\)/${AUTO_LOADED_COUNT} (37 Core + 54 Awesome − 11 gemeinsam)/" docs/i18n/README.de.md
            # Table row: pack "364 installierte Dateien"
            sed -i -E "s/Agent-Pakete \| [0-9]+ installierte Dateien/Agent-Pakete | ${AGENT_PACK_COUNT} installierte Dateien/" docs/i18n/README.de.md
            # Table row: skills
            sed -i -E "s/\| Skills \| [0-9]+ \|/| Skills | ${SKILL_COUNT} |/" docs/i18n/README.de.md
            # Architecture diagram (English in code block)
            sed -i -E "s/Agent Layer \([0-9]+ unique agents/Agent Layer (${INSTALLED_AGENT_TOTAL} unique agents/" docs/i18n/README.de.md
            sed -i -E "s/Auto-loaded \([0-9]+\)/Auto-loaded (${AUTO_LOADED_COUNT})/" docs/i18n/README.de.md
            sed -i -E "s/Agent Packs \([0-9]+\)/Agent Packs (${AGENT_PACK_COUNT})/" docs/i18n/README.de.md
            sed -i -E "s/Skills Layer \([0-9]+ from ECC\)/Skills Layer (${SKILL_COUNT} from ECC)/" docs/i18n/README.de.md
          fi
          if [ -f docs/i18n/README.fr.md ]; then
            # Hero line: **NNN fichiers d'agents installés** (NNN chargés automatiquement + NNN packs d'agents) et **NNN skills**
            sed -i -E "s/\*\*[0-9]+ fichiers d'agents installés\*\* \([0-9]+ chargés automatiquement \+ [0-9]+ packs d'agents\) et \*\*[0-9]+ skills\*\*/**${INSTALLED_AGENT_TOTAL} fichiers d'agents installés** (${AUTO_LOADED_COUNT} chargés automatiquement + ${AGENT_PACK_COUNT} packs d'agents) et **${SKILL_COUNT} skills**/" docs/i18n/README.fr.md
            # Zero-config: NNN fichiers d'agents prêts à l'emploi
            sed -i -E "s/[0-9]+ fichiers d'agents prêts à l'emploi/${INSTALLED_AGENT_TOTAL} fichiers d'agents prêts à l'emploi/" docs/i18n/README.fr.md
            # All-in-one bundle: **NNN fichiers d'agents installés et NNN skills**
            sed -i -E "s/\*\*[0-9]+ fichiers d'agents installés et [0-9]+ skills\*\*/**${INSTALLED_AGENT_TOTAL} fichiers d'agents installés et ${SKILL_COUNT} skills**/" docs/i18n/README.fr.md
            # Core agents prose: ramènent l'ensemble auto-chargé final à NNN fichiers installés
            sed -i -E "s/ramènent l'ensemble auto-chargé final à [0-9]+ fichiers installés/ramènent l'ensemble auto-chargé final à ${AUTO_LOADED_COUNT} fichiers installés/" docs/i18n/README.fr.md
            # Agent pack section: NNN fichiers de packs d'agents répartis en 21 catégories
            sed -i -E "s/[0-9]+ fichiers de packs d'agents répartis en 21 catégories/${AGENT_PACK_COUNT} fichiers de packs d'agents répartis en 21 catégories/" docs/i18n/README.fr.md
            # Table row: auto-loaded "80 (37 Core + 54 Awesome − 11 partagés)"
            sed -i -E "s/[0-9]+ \(37 Core \+ 54 Awesome − 11 partagés\)/${AUTO_LOADED_COUNT} (37 Core + 54 Awesome − 11 partagés)/" docs/i18n/README.fr.md
            # Table row: pack "364 fichiers installés"
            sed -i -E "s/Packs d'agents \| [0-9]+ fichiers installés/Packs d'agents | ${AGENT_PACK_COUNT} fichiers installés/" docs/i18n/README.fr.md
            # Table row: skills
            sed -i -E "s/\| Skills \| [0-9]+ \|/| Skills | ${SKILL_COUNT} |/" docs/i18n/README.fr.md
            # Architecture diagram (English in code block, but fr has French for footprint lines)
            sed -i -E "s/Agent Layer \([0-9]+ unique agents/Agent Layer (${INSTALLED_AGENT_TOTAL} unique agents/" docs/i18n/README.fr.md
            sed -i -E "s/Auto-loaded \([0-9]+\): empreinte/Auto-loaded (${AUTO_LOADED_COUNT}): empreinte/" docs/i18n/README.fr.md
            sed -i -E "s/Agent Packs \([0-9]+\): empreinte/Agent Packs (${AGENT_PACK_COUNT}): empreinte/" docs/i18n/README.fr.md
            sed -i -E "s/Skills Layer \([0-9]+ from ECC\)/Skills Layer (${SKILL_COUNT} from ECC)/" docs/i18n/README.fr.md
          fi
          # SETUP.md — update auto-loaded and pack-loaded counts
          if [ -f SETUP.md ]; then
            sed -i -E "s/[0-9]+ unique agents \([0-9]+ core \+ [0-9]+ awesome core, deduplicated\)/${AUTO_LOADED_COUNT} unique agents (37 core + 54 awesome core, deduplicated)/" SETUP.md
            sed -i -E "s/[0-9]+ on-demand pack files/${AGENT_PACK_COUNT} on-demand pack files/" SETUP.md
            sed -i -E "s/[0-9]+ skills/${SKILL_COUNT} skills/" SETUP.md
            # Verification expected output
            sed -i -E "s/Core agents:  [0-9]+/Core agents:  ${AUTO_LOADED_COUNT}/" SETUP.md
            sed -i -E "s/Agent packs:  [0-9]+/Agent packs:  ${AGENT_PACK_COUNT}/" SETUP.md
            sed -i -E "s/Skills:       [0-9]+/Skills:       ${SKILL_COUNT}/" SETUP.md
          fi

          # docs/index.html — targeted updates (avoid greedy global replace)
          if [ -f docs/index.html ]; then
            sed -i -E 's/[0-9]+ installed agent files \([0-9]+ auto-loaded \+ [0-9]+ agent-packs\)/'"${INSTALLED_AGENT_TOTAL} installed agent files (${AUTO_LOADED_COUNT} auto-loaded + ${AGENT_PACK_COUNT} agent-packs)"'/g' docs/index.html
            # Hero data-count attributes
            sed -i -E 's/data-count="[0-9]+"(>0<\/em> <span class="lang" data-en="agents")/data-count="'"${INSTALLED_AGENT_TOTAL}"'"\1/' docs/index.html
            sed -i -E 's/data-count="[0-9]+"(>0<\/em> <span class="lang" data-en="skills")/data-count="'"${SKILL_COUNT}"'"\1/' docs/index.html
            # Comparison table
            sed -i -E 's/(&#x2705; )[0-9]+(.*Native TOML)/\1'"${INSTALLED_AGENT_TOTAL}"'\2/' docs/index.html
            sed -i -E 's/(&#x2705; )[0-9]+(.*Skills included)/\1'"${SKILL_COUNT}"'\2/' docs/index.html
            # Badges (shields.io underscore format)
            sed -i -E "s/[0-9]+_agents/${INSTALLED_AGENT_TOTAL}_agents/g" docs/index.html
            sed -i -E "s/[0-9]+_skills/${SKILL_COUNT}_skills/g" docs/index.html
            sed -i -E "s/[0-9]+ installed native TOML agent files/${INSTALLED_AGENT_TOTAL} installed native TOML agent files/g" docs/index.html
            sed -i -E "s/[0-9]+개 설치 네이티브 TOML 에이전트 파일/${INSTALLED_AGENT_TOTAL}개 설치 네이티브 TOML 에이전트 파일/g" docs/index.html
            sed -i -E "s/[0-9]+ agent-packs →/$(printf '%s' "${AGENT_PACK_COUNT}") agent-packs →/g" docs/index.html
            sed -i -E "s/[0-9]+개 에이전트팩 →/${AGENT_PACK_COUNT}개 에이전트팩 →/g" docs/index.html
            sed -i -E 's/(Agent Packs".*<span class="cnt">)[0-9]+(<\/span>)/\1'"${AGENT_PACK_COUNT}"'\2/' docs/index.html
            sed -i -E "s/All [0-9]+ installed agent files/All ${INSTALLED_AGENT_TOTAL} installed agent files/g" docs/index.html
            sed -i -E "s/설치되는 [0-9]+개 에이전트 파일 모두/설치되는 ${INSTALLED_AGENT_TOTAL}개 에이전트 파일 모두/g" docs/index.html
            sed -i -E "s/[0-9]+ installed agent files organized/${INSTALLED_AGENT_TOTAL} installed agent files organized/g" docs/index.html
            sed -i -E "s/[0-9]+개 설치 에이전트 파일을/${INSTALLED_AGENT_TOTAL}개 설치 에이전트 파일을/g" docs/index.html
            sed -i -E "s/Done\. [0-9]+ installed agent files ready/Done. ${INSTALLED_AGENT_TOTAL} installed agent files ready/g" docs/index.html
            sed -i -E "s/완료\. [0-9]+개 설치 에이전트 파일 준비됨/완료. ${INSTALLED_AGENT_TOTAL}개 설치 에이전트 파일 준비됨/g" docs/index.html
            sed -i -E "s/aggregates 4 curated upstream sources into [0-9]+ installed agent files and [0-9]+ skills/aggregates 4 curated upstream sources into ${INSTALLED_AGENT_TOTAL} installed agent files and ${SKILL_COUNT} skills/g" docs/index.html
            sed -i -E 's/VoltAgent — [0-9]+ production-grade native TOML agents/VoltAgent — native TOML categories for Codex specialists/g' docs/index.html
            sed -i -E 's/VoltAgent — [0-9]+개 프로덕션급 네이티브 TOML 에이전트/VoltAgent — Codex 전문가용 네이티브 TOML 카테고리/g' docs/index.html
            # Pipeline diagram "N + N + N"
            sed -i -E "s/[0-9]+ \+ [0-9]+ \+ [0-9]+/${AUTO_LOADED_COUNT} + ${AGENT_PACK_COUNT} + ${SKILL_COUNT}/" docs/index.html
            sed -i -E "s/All [0-9]+ installed pack files/All ${AGENT_PACK_COUNT} installed pack files/g" docs/index.html
            sed -i -E "s/전체 [0-9]+개 팩 파일이/전체 ${AGENT_PACK_COUNT}개 팩 파일이/g" docs/index.html
            # Meta description tags
            sed -i -E "s/[0-9]+ installed agent files \([0-9]+ auto-loaded \+ [0-9]+ agent-packs\), [0-9]+ skills/${INSTALLED_AGENT_TOTAL} installed agent files (${AUTO_LOADED_COUNT} auto-loaded + ${AGENT_PACK_COUNT} agent-packs), ${SKILL_COUNT} skills/g" docs/index.html
            # Skills cnt span
            sed -i -E 's/(Skills".*<span class="cnt">)[0-9]+(<\/span>)/\1'"${SKILL_COUNT}"'\2/' docs/index.html
            # Terminal demo "N skills installed"
            sed -i -E "s/[0-9]+ skills installed/${SKILL_COUNT} skills installed/g" docs/index.html
            sed -i -E "s/[0-9]+개 스킬 설치 완료/${SKILL_COUNT}개 스킬 설치 완료/g" docs/index.html
          fi

          # AI-INSTALL.md — update detail counts
          if [ -f AI-INSTALL.md ]; then
            sed -i -E "s/installs [0-9]+ agent files \(.*\), [0-9]+ skills/installs ${INSTALLED_AGENT_TOTAL} agent files (${AUTO_LOADED_COUNT} auto-loaded + ${AGENT_PACK_COUNT} agent-packs), ${SKILL_COUNT} skills/" AI-INSTALL.md
            sed -i -E "s/repository currently contains [0-9]+ TOML definitions/repository currently contains ${SOURCE_TOML_COUNT} TOML definitions/" AI-INSTALL.md
            sed -i -E "s/- [0-9]+ auto-loaded agents/- ${AUTO_LOADED_COUNT} auto-loaded agents/" AI-INSTALL.md
            sed -i -E "s/- [0-9]+ domain agent-packs/- ${AGENT_PACK_COUNT} domain agent-packs/" AI-INSTALL.md
            sed -i -E "s/- [0-9]+ skills/- ${SKILL_COUNT} skills/" AI-INSTALL.md
            sed -i -E "s/Core agents: [0-9]+/Core agents: ${AUTO_LOADED_COUNT}/" AI-INSTALL.md
            sed -i -E "s/Agent packs: [0-9]+/Agent packs: ${AGENT_PACK_COUNT}/" AI-INSTALL.md
            sed -i -E "s/Skills: [0-9]+( managed installs)?/Skills: ${SKILL_COUNT} managed installs/" AI-INSTALL.md
          fi

      # 8. Create PR
      - name: Create sync PR
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="auto/sync-$(date +%Y%m%d-%H%M)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore: sync upstream dependencies ($(date +%Y-%m-%d))"
            git push -u origin "$BRANCH"
            gh label create "auto-sync" --color "0075ca" --description "Automated upstream sync" 2>/dev/null || true
            gh pr create \
              --title "chore: sync upstream ($(date +%Y-%m-%d))" \
              --body "Upstream sync from 4 upstream sources. Review diffs before merging." \
              --label "auto-sync"
            # Report validate status so branch protection allows merge
            COMMIT_SHA=$(git rev-parse HEAD)
            gh api "repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -X POST \
              -f state=success \
              -f context=validate \
              -f description="Sync PR — validated inline"
            gh pr merge "$BRANCH" --auto --squash --delete-branch
          fi
        env:
          GH_TOKEN: ${{ github.token }}
