name: Update Upstream Submodules
on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Specific submodule to update (blank = all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodules
        run: |
          if [ -n "${{ github.event.inputs.submodule }}" ]; then
            git -C "upstream/${{ github.event.inputs.submodule }}" pull origin HEAD
            git add "upstream/${{ github.event.inputs.submodule }}"
          else
            git submodule update --remote
            git add upstream/
          fi

      - name: Check for changes
        id: check
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "## Updated submodules:" >> "$GITHUB_STEP_SUMMARY"
            git diff --cached --name-only >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Security scan of upstream diff
        id: scan
        if: steps.check.outputs.changed == 'true'
        env:
          SCAN_REPORT: scan-report.md
        run: |
          bash scripts/scan-upstream-diff.sh
          cat scan-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create PR
        id: pr
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update upstream submodules $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          # Rebase onto latest main to avoid diverged-branch auto-merge failures
          git fetch origin main
          git rebase origin/main
          git push --force-with-lease origin "$BRANCH"
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$SHA \
            -f state=success \
            -f context=validate \
            -f description="Submodule pointer update"
          PR_URL=$(gh pr create \
            --title "chore: update upstream submodules $(date +%Y-%m-%d)" \
            --body "Automated upstream submodule update." \
            --base main)
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      # Clean scan → merge automatically, as before.
      - name: Auto-merge (scan clean)
        if: steps.check.outputs.changed == 'true' && steps.scan.outputs.flagged == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.url }}" --squash --delete-branch

      # Flagged scan → leave PR open, label it, and post the scan report.
      - name: Flag for manual review (scan flagged)
        if: steps.check.outputs.changed == 'true' && steps.scan.outputs.flagged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create needs-review \
            --color FBCA04 \
            --description "Automated change flagged by security scan; needs human review" \
            2>/dev/null || true
          gh pr edit "${{ steps.pr.outputs.url }}" --add-label needs-review
          gh pr comment "${{ steps.pr.outputs.url }}" --body-file scan-report.md
          echo "::warning::Upstream sync flagged by security scan — PR left open for manual review."
