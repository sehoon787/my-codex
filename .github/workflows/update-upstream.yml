name: Update Upstream Submodules
on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Specific submodule to update (blank = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodules
        run: |
          if [ -n "${{ github.event.inputs.submodule }}" ]; then
            git -C "upstream/${{ github.event.inputs.submodule }}" pull origin HEAD
            git add "upstream/${{ github.event.inputs.submodule }}"
          else
            git submodule update --remote
            git add upstream/
          fi

      - name: Check for changes
        id: check
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "## Updated submodules:" >> "$GITHUB_STEP_SUMMARY"
            git diff --cached --name-only >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push to main
        if: steps.check.outputs.changed == 'true'
        run: |
          git commit -m "chore: update upstream submodules $(date +%Y-%m-%d)"
          git push origin main
